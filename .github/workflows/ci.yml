name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-glibc
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: ubuntu-musl
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - name: macos
            runner: macos-latest
            target: x86_64-apple-darwin
          - name: windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        # musl target produces fully static binaries (pure rustls/ring, no OpenSSL);
        # +crt-static makes this explicit
        env:
          RUSTFLAGS: ${{ matrix.target == 'x86_64-unknown-linux-musl' && '-C target-feature=+crt-static' || '' }}
        run: cargo build -p ma-world --locked --release --target ${{ matrix.target }}
