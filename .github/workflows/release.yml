name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build release ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-glibc
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: ma-world
          - name: ubuntu-musl
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            bin: ma-world
          - name: macos
            runner: macos-latest
            target: x86_64-apple-darwin
            bin: ma-world
          - name: windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            bin: ma-world.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        # musl target produces fully static binaries (pure rustls/ring, no OpenSSL);
        # +crt-static makes this explicit
        env:
          RUSTFLAGS: ${{ matrix.target == 'x86_64-unknown-linux-musl' && '-C target-feature=+crt-static' || '' }}
        run: cargo build -p ma-world --locked --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/${{ matrix.bin }}"
          ASSET="ma-world-${{ matrix.target }}.tar.gz"
          tar -C dist -czf "$ASSET" "${{ matrix.bin }}"
          sha256sum "$ASSET" > "$ASSET.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: |
            ma-world-${{ matrix.target }}.tar.gz
            ma-world-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  github_release:
    name: Create GitHub Release
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          merge-multiple: true
          path: release-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-artifacts/*.tar.gz
            release-artifacts/*.sha256

  publish_crates:
    name: Publish crates (trusted publishing)
    needs:
      - build
      - github_release
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Authenticate to crates.io (OIDC)
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Dry-run publish checks
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail
          cargo publish -p ma-world-core --locked --dry-run
          cargo publish -p ma-world --locked --dry-run

      - name: Publish ma-world-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p ma-world-core --locked

      - name: Publish ma-world
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            if cargo publish -p ma-world --locked; then
              exit 0
            fi
            echo "publish attempt $attempt for ma-world failed, retrying after index propagation"
            sleep 20
          done
          echo "ma-world publish failed after retries"
          exit 1
